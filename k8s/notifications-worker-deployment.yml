apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-worker
  namespace: gamestore
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: notifications-worker
  template:
    metadata:
      labels:
        app: notifications-worker
    spec:
      containers:
        - name: notifications-worker
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/notifications-worker:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: notifications-config
            - secretRef:
                name: notifications-secret
