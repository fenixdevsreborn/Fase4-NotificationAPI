name: Deploy to EKS

on:
  workflow_run:
    workflows:
      - Build and Push (Docker Hub)
    types:
      - completed
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DOCKERHUB_REPOSITORY: notifications-worker
  EKS_CLUSTER_NAME: fcg-fase4
  K8S_NAMESPACE: fase4
  K8S_DEPLOYMENT_NAME: notifications-worker
  K8S_CONTAINER_NAME: notifications-worker

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Set image and rollout
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          fi

          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/$DOCKERHUB_REPOSITORY:$IMAGE_TAG"
          kubectl set image deployment/"$K8S_DEPLOYMENT_NAME" \
            "$K8S_CONTAINER_NAME"="$IMAGE" \
            -n "$K8S_NAMESPACE"
          kubectl rollout status deployment/"$K8S_DEPLOYMENT_NAME" -n "$K8S_NAMESPACE" --timeout=180s
